<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var l = window.location;
      
      var targetUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/BitRecon/';
      
      if (l.href !== targetUrl) {
        l.replace(targetUrl);
      }
    </script>
  </head>
  <body></body>
</html>
